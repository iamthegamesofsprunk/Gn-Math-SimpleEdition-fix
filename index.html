<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GN-MATH SIMPLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iamthegamesofsprunk/Gn-Math-SimpleEdition-fix@main/style.css" />
</head>
<body>

    <input type="text" id="searchBar" placeholder="SEARCH ALL ZONES..." oninput="filterZones()">
    <div id="container">LOADING DATABASE...</div>

    <div id="zoneViewer">
        <div class="zone-header">
            <h2 id="zoneName" style="margin:0; font-size: 18px;">GAME</h2>
            <div class="header-controls">
                <button class="player-btn" onclick="fullscreenZone()">FULLSCREEN</button>
                <button class="player-btn" onclick="aboutBlank()">NEW TAB</button>
                <button class="player-btn close-btn" onclick="closeZone()">CLOSE</button>
            </div>
        </div>
        <span id="activeZoneId" style="display:none;"></span>
    </div>

<script src="https://cdn.jsdelivr.net/gh/iamthegamesofsprunk/Gn-Math-SimpleEdition-fix@main/script.js"></script>
</body>
</html>
